<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question 💍</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #ff758c, #ff7eb3, #ff4d6d, #ff85a2);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    height: 100vh;
    overflow: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.falling-heart {
    position: fixed;
    top: -20px;
    font-size: 20px;
    animation: fall linear forwards;
    opacity: 0.9;
    z-index: 1;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
        opacity: 0.3;
    }
}

.nameTag {
    font-size: 38px;
    margin-bottom: 10px;
    font-weight: bold;
    color: white;
    animation: slideGlow 2s ease-out forwards;
    opacity: 0;
    position: relative;
    z-index: 2;
}

@keyframes slideGlow {
    0% { transform: translateY(-100px) scale(0.5); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
}

#questionBox, #celebration {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    color: white;
    text-align: center;
    position: relative;
    z-index: 2;
}

#celebration { display: none; }

h1, h2 {
    background: rgba(0,0,0,0.3);
    padding: 20px 35px;
    border-radius: 20px;
    z-index: 2;
}

button {
    padding: 12px 25px;
    font-size: 20px;
    margin: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    z-index: 2;
}

button:hover { transform: scale(1.1); }

#celebrationVideo {
    width: 400px;
    margin-top: 20px;
    transform: scale(0);
    opacity: 0;
    transition: 1s ease;
    z-index: 2;
}

#celebrationVideo.show {
    transform: scale(1);
    opacity: 1;
}
</style>
</head>

<body>

<div id="questionBox">
    <div class="nameTag">Yehia 💖</div>
    <h2>One Important Question 😌❤️</h2>
    <h1>Will you be in my future life? 💍✨</h1>

    <div>
        <button onclick="rightAnswer()">Yes ❤️</button>
        <button id="escapeBtn">No 😏</button>
    </div>
</div>

<div id="celebration">
    <h1 id="greeting"></h1>
    
    <!-- الفيديو فقط -->
    <video id="celebrationVideo" width="400" controls>
      <source src="celebration.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
</div>

<script>
function createFallingHeart() {
    const heart = document.createElement("div");
    heart.classList.add("falling-heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 30) + "px";
    heart.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 8000);
}
setInterval(createFallingHeart, 200);

function rightAnswer(){
    document.getElementById("questionBox").style.display = "none";
    document.getElementById("celebration").style.display = "flex";

    document.getElementById("greeting").innerHTML =
        "You chose perfectly 😌✨<br>Valentine's Day for me is your birthday. Happy birthday, and may you always be with me in the past, present, and future ❤️❤️";

    setTimeout(function(){
        const video = document.getElementById("celebrationVideo");
        video.classList.add("show");
        video.play();
    }, 500);
}

var escapeBtn = document.getElementById("escapeBtn");
escapeBtn.addEventListener("mouseover", function(){
    var randomX = Math.floor(Math.random() * (window.innerWidth - 100));
    var randomY = Math.floor(Math.random() * (window.innerHeight - 50));
    escapeBtn.style.position = "absolute";
    escapeBtn.style.left = randomX + "px";
    escapeBtn.style.top = randomY + "px";
});
</script>

</body>
</html>
